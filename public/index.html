<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VertexHandshake — Stateful P2P Handshake Demo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--bg2:#111827;--card:#151d2e;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#a78bfa;--cyan:#06b6d4;--mono:'JetBrains Mono',monospace;--display:'Space Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column}

.header{background:rgba(15,23,42,.95);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px)}
.logo{font-family:var(--display);font-weight:700;font-size:22px;display:flex;align-items:center;gap:12px}
.logo span{color:var(--cyan)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--cyan),var(--blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.badges{display:flex;gap:8px}
.badge{font-size:10px;padding:3px 10px;border-radius:4px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.badge-vertex{background:rgba(56,189,248,.1);color:var(--blue);border:1px solid rgba(56,189,248,.25)}
.badge-phase{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25);min-width:100px;text-align:center}
.badge-phase.fail{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.25)}
.btns{display:flex;gap:8px}
.btn{font-family:var(--mono);font-size:11px;padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.btn:hover{background:var(--bg2);color:var(--text);border-color:#334155}
.btn-red{border-color:rgba(239,68,68,.3);color:var(--red)}.btn-red:hover{background:rgba(239,68,68,.1)}

.main{flex:1;display:grid;grid-template-columns:1fr 360px;gap:0}

/* ─── Visual Area ─── */
.visual{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
canvas#viz{width:100%;height:100%}

/* ─── Right Panel ─── */
.panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-section{border-bottom:1px solid var(--border)}
.panel-title{padding:12px 18px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}

.node-cards{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.node-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:all .2s}
.node-card.dead{opacity:.3;border-color:rgba(239,68,68,.3)}
.node-card.syncing{border-color:rgba(56,189,248,.3);box-shadow:0 0 12px rgba(56,189,248,.08)}
.node-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.node-name{font-weight:700;font-size:14px}.node-name.a{color:var(--cyan)}.node-name.b{color:var(--purple)}
.node-status{font-size:9px;padding:2px 8px;border-radius:3px;text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.node-status.idle{background:rgba(100,116,139,.1);color:var(--muted)}
.node-status.discovering{background:rgba(167,139,250,.1);color:var(--purple)}
.node-status.syncing{background:rgba(56,189,248,.1);color:var(--blue)}
.node-status.synced{background:rgba(34,197,94,.1);color:var(--green)}
.node-status.dead{background:rgba(239,68,68,.1);color:var(--red)}
.node-status.recovering{background:rgba(245,158,11,.1);color:var(--amber)}

.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.state-item{background:rgba(10,14,23,.5);border-radius:6px;padding:6px 10px}
.state-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.state-val{font-size:16px;font-weight:700;margin-top:2px}
.state-val.blue{color:var(--blue)}.state-val.green{color:var(--green)}.state-val.amber{color:var(--amber)}.state-val.purple{color:var(--purple)}

.stats-row{padding:12px 18px;display:flex;gap:16px;flex-wrap:wrap}
.stat-chip{display:flex;flex-direction:column;gap:2px}
.stat-chip .v{font-size:16px;font-weight:700}
.stat-chip .v.green{color:var(--green)}.stat-chip .v.blue{color:var(--blue)}.stat-chip .v.amber{color:var(--amber)}.stat-chip .v.red{color:var(--red)}
.stat-chip .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

.event-log{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.event-log::-webkit-scrollbar{width:4px}.event-log::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.evt{font-size:10px;line-height:1.6;padding:2px 0;color:#94a3b8;border-bottom:1px solid rgba(30,41,59,.5);animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.evt-time{color:var(--muted);margin-right:6px}
.evt .tag{font-weight:600}
.tag.mesh{color:var(--purple)}.tag.sync{color:var(--blue)}.tag.fail{color:var(--red)}.tag.recover{color:var(--amber)}.tag.ok{color:var(--green)}.tag.sys{color:var(--muted)}

.footer{padding:8px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:900px){.main{grid-template-columns:1fr;grid-template-rows:50vh 1fr}}
</style>
</head>

class Node{

function step(){

  if(B.alive)B.lat=15+Math.random()*30;

  if(phase==='boot'){
    A.status='booting';B.status='booting';
    if(pt>25){log('sys','Both nodes powered on. Starting discovery...');phase='discovery';pt=0}
  }else if(phase==='discovery'){
    A.status='discovering';if(B.alive)B.status='discovering';
    if(pt===15)log('mesh',`${A.name} broadcasting gossip event...`);
    if(pt===25&&B.alive)log('mesh',`${B.name} received gossip → peer identified`);
    if(pt===35&&B.alive){A.peer=B.id;B.peer=A.id;log('mesh','✓ Handshake complete. Bidirectional link established.');phase='syncing';pt=0}
  }else if(phase==='syncing'){
    A.status='syncing';if(B.alive)B.status='syncing';
    if(pt%20===0&&B.alive){
      A.counter++;B.counter++;A.temp=20+Math.random()*10;B.temp=20+Math.random()*10;
      A.syncCount++;B.syncCount++;
      log('sync',`State sync #${A.syncCount}: counter=${A.counter}, temp=${A.temp.toFixed(1)}°C`);
    }
    if(pt>80&&!killed){A.status='synced';B.status='synced';phase='synced';pt=0;log('ok','✓ State fully synchronized. Both nodes in consensus.')}
    if(pt>60&&killed&&!recovered){phase='failure';pt=0}
  }else if(phase==='synced'){
    // Keep syncing in background
    if(pt%30===0&&B.alive){A.counter++;B.counter++;A.temp=20+Math.random()*10;B.temp=A.temp;A.syncCount++;B.syncCount++;log('sync',`Heartbeat #${A.syncCount}: counter=${A.counter}`)}
    if(killed&&!recovered){phase='failure';pt=0}
  }else if(phase==='failure'){
    A.status='recovering';
    if(pt===1)log('fail',`⚠ ${B.name} disconnected. Peer lost.`);
    if(pt===15)log('recover',`${A.name} detected missing gossip events from ${B.name}`);
    if(pt===30)log('recover',`${A.name} entering solo mode. Buffering state changes...`);
    if(pt===50){
      // Revive B
      B.alive=true;B.status='discovering';
      log('mesh',`${B.name} back online. Re-discovery via gossip...`);
      phase='recovery';pt=0
    }
  }else if(phase==='recovery'){
    A.status='recovering';B.status='recovering';
    if(pt===15){B.peer=A.id;A.peer=B.id;log('mesh',`✓ ${B.name} re-joined mesh. Handshake restored.`)}
    if(pt===30)log('sync',`Re-syncing buffered state → counter=${A.counter}, temp=${A.temp.toFixed(1)}°C`);
    if(pt===45){B.counter=A.counter;B.temp=A.temp;B.syncCount=A.syncCount;log('ok','✓ Full state recovered. Both nodes in consensus again.');A.status='synced';B.status='synced';phase='complete';pt=0;recovered=true}
  }else if(phase==='complete'){
    if(pt%30===0){A.counter++;B.counter++;A.temp=20+Math.random()*10;B.temp=A.temp;A.syncCount++;B.syncCount++;log('sync',`Heartbeat #${A.syncCount}: counter=${A.counter}`)}
  }
}

function killNode(){
  if(B.alive&&!killed){B.alive=false;B.status='dead';B.peer=null;A.peer=null;killed=true;log('fail',`🛑 ${B.name} manually killed.`)}
}

function reset(){
  A=new Node(0,'NODE-A',CA);B=new Node(1,'NODE-B',CB);tick=0;phase='boot';pt=0;events=[];start=Date.now();killed=false;recovered=false;
}

// ─── Render ────────────────────────────────────────────
function render(){
  // Phase badge
  const pb=document.getElementById('phaseBadge');
  const pm={boot:'BOOTING',discovery:'DISCOVERY',syncing:'SYNCING',synced:'SYNCED',failure:'FAILURE',recovery:'RECOVERY',complete:'COMPLETE'};
  pb.textContent=pm[phase]||phase.toUpperCase();
  pb.className='badge badge-phase';if(['failure'].includes(phase))pb.classList.add('fail');

  // Node cards
  document.getElementById('nodeCards').innerHTML=[A,B].map(n=>{
    let cc=!n.alive?'dead':n.status==='syncing'?'syncing':'';
    return`<div class="node-card ${cc}">
      <div class="node-top"><span class="node-name ${n.id===0?'a':'b'}">${n.name}</span><span class="node-status ${n.status}">${n.status}</span></div>
      <div class="state-grid">
        <div class="state-item"><div class="state-label">Counter</div><div class="state-val blue">${n.counter}</div></div>
        <div class="state-item"><div class="state-label">Temp</div><div class="state-val amber">${n.temp.toFixed(1)}°C</div></div>
        <div class="state-item"><div class="state-label">Latency</div><div class="state-val green">${n.alive?n.lat.toFixed(0)+'ms':'--'}</div></div>
        <div class="state-item"><div class="state-label">Syncs</div><div class="state-val purple">${n.syncCount}</div></div>
      </div>
    </div>`}).join('');

  // Stats
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-chip"><div class="v green">${[A,B].filter(n=>n.alive).length}/2</div><div class="l">Peers</div></div>
    <div class="stat-chip"><div class="v blue">${A.alive&&B.alive?Math.round((A.lat+B.lat)/2)+'ms':'--'}</div><div class="l">Avg Lat</div></div>
    <div class="stat-chip"><div class="v amber">${A.syncCount}</div><div class="l">Syncs</div></div>
    <div class="stat-chip"><div class="v red">0</div><div class="l">Cloud</div></div>`;

  // Events
  document.getElementById('log').innerHTML=events.slice().reverse().slice(0,25).map(e=>`<div class="evt"><span class="evt-time">${e.t}s</span><span class="tag ${e.type}">[${e.type.toUpperCase()}]</span> ${e.msg}</div>`).join('');

  renderViz();
}

function renderViz(){
  const c=document.getElementById('viz'),r=c.parentElement.getBoundingClientRect();
  c.width=r.width*devicePixelRatio;c.height=r.height*devicePixelRatio;c.style.width=r.width+'px';c.style.height=r.height+'px';
  const ctx=c.getContext('2d');ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=r.width,H=r.height,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(30,41,59,.3)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  const ax=cx-160,ay=cy,bx=cx+160,by=cy;
  const t=Date.now()/1000;

  // Connection line
  if(A.alive&&B.alive&&A.peer!==null){
    // Animated data packets
    ctx.strokeStyle='rgba(56,189,248,.2)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();

    if(['syncing','synced','recovery','complete'].includes(phase)){
      const packetCount=3;
      for(let i=0;i<packetCount;i++){
        let prog=((t*0.8+i/packetCount)%1);
        let px=ax+(bx-ax)*prog,py=ay+(by-ay)*prog;
        ctx.fillStyle='rgba(56,189,248,.6)';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
        // Reverse
        let prog2=((t*0.6+i/packetCount+0.5)%1);
        let px2=bx+(ax-bx)*prog2,py2=by+(ay-by)*prog2;
        ctx.fillStyle='rgba(167,139,250,.6)';ctx.beginPath();ctx.arc(px2,py2,3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Disconnected line
  if(A.alive&&!B.alive){
    ctx.strokeStyle='rgba(239,68,68,.15)';ctx.lineWidth=1;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.setLineDash([]);
  }

  // Node A
  drawNode(ctx,ax,ay,A,t);
  // Node B
  drawNode(ctx,bx,by,B,t);

  // Center label
  if(A.peer!==null&&B.alive){
    ctx.fillStyle='rgba(56,189,248,.12)';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText('VERTEX P2P MESH',cx,cy-50);
    ctx.fillText(`Latency: ${Math.round((A.lat+B.lat)/2)}ms | Cloud: 0`,cx,cy+60);
    ctx.textAlign='left';
  }

  // Phase label
  if(phase==='complete'){
    ctx.fillStyle='rgba(34,197,94,.12)';ctx.font='bold 20px Space Grotesk';ctx.textAlign='center';
    ctx.fillText('✓ HANDSHAKE COMPLETE — RESILIENT MESH PROVEN',cx,H-40);
    ctx.textAlign='left';
  }
}

function drawNode(ctx,x,y,node,t){
  const alive=node.alive;
  const col=node.color;
  const r=alive?30:25;

  // Glow
  if(alive&&node.status!=='idle'&&node.status!=='booting'){
    const g=ctx.createRadialGradient(x,y,0,x,y,r+20);
    g.addColorStop(0,col.replace(')',',0.15)').replace('#','')); // Won't work perfectly but close
    g.addColorStop(0,`${col}22`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r+20,0,Math.PI*2);ctx.fill();
  }

  // Ring
  ctx.strokeStyle=alive?col:'rgba(239,68,68,.4)';
  ctx.lineWidth=alive?2.5:1.5;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();

  // Pulse animation
  if(alive&&['syncing','synced','complete'].includes(node.status)){
    let pulseR=r+10+Math.sin(t*3+node.id)*8;
    ctx.strokeStyle=`${col}33`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,pulseR,0,Math.PI*2);ctx.stroke();
  }

  // Inner
  ctx.fillStyle=alive?`${col}18`:'rgba(239,68,68,.08)';
  ctx.beginPath();ctx.arc(x,y,r-2,0,Math.PI*2);ctx.fill();

  // Icon
  ctx.fillStyle=alive?col:'rgba(239,68,68,.5)';
  ctx.font=alive?'16px serif':'14px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(alive?'⬡':'✕',x,y);

  // Name
  ctx.fillStyle=alive?col:'rgba(239,68,68,.5)';
  ctx.font='bold 12px JetBrains Mono';
  ctx.fillText(node.name,x,y+r+18);

  // Status
  ctx.fillStyle=alive?'rgba(226,232,240,.5)':'rgba(239,68,68,.4)';
  ctx.font='9px JetBrains Mono';
  ctx.fillText(node.status.toUpperCase(),x,y+r+32);

  // State values
  if(alive){
    ctx.font='10px JetBrains Mono';
    ctx.fillStyle='rgba(226,232,240,.3)';
    ctx.fillText(`cnt:${node.counter} | ${node.temp.toFixed(1)}°C`,x,y-r-12);
  }

  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}

setInterval(()=>{step();render()},50);
</script>
